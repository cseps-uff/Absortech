services:
  absortech-db:
    image: postgres:15-alpine
    container_name: absortech-db
    env_file:
      - .env.dev
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - absortech-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 30s
      timeout: 10s
      retries: 3

  absortech-api:
    build:
      context: ./
      dockerfile: dockerfiles/django
    container_name: absortech-api
    env_file:
      - .env.dev
    environment:
      DB_HOST: absortech-db
      DJANGO_RUNSERVER: "True"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    depends_on:
      absortech-db:
        condition: service_healthy
    networks:
      - absortech-network
    restart: unless-stopped

  absortech-app:
    build:
      context: ./
      dockerfile: dockerfiles/node
      args:
        VITE_API_HOST: ${VITE_API_HOST:-http://localhost:8000/api}
    container_name: absortech-app
    ports:
      - "3000:3000"
    networks:
      - absortech-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  absortech-network:
    driver: bridge
