server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /api {
        return 301 /api/;
    }

    location /api/ {
        proxy_pass https://absortech-api.fly.dev;
        proxy_http_version 1.1;

        proxy_ssl_server_name on;
        proxy_set_header Host absortech-api.fly.dev;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_redirect off;
    }

    location /admin/ {
        proxy_pass https://absortech-api.fly.dev;
        proxy_http_version 1.1;

        proxy_ssl_server_name on;
        proxy_set_header Host absortech-api.fly.dev;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_redirect off;
    }

    location /static/ {
        proxy_pass https://absortech-api.fly.dev;
        proxy_http_version 1.1;

        proxy_ssl_server_name on;
        proxy_set_header Host absortech-api.fly.dev;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_redirect off;
    }

    location /media/ {
        proxy_pass https://absortech-api.fly.dev;
        proxy_http_version 1.1;

        proxy_ssl_server_name on;
        proxy_set_header Host absortech-api.fly.dev;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_redirect off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}