app = "absortech-web"
primary_region = "gru"

[build]
	dockerfile = "../../dockerfiles/node"

[http_service]
	internal_port = 3000
	force_https = true
	auto_start_machines = true
	auto_stop_machines = "off"
	min_machines_running = 1
	processes = ["app"]

[[vm]]
	cpu_kind = "shared"
	cpus = 1
	memory_mb = 512
